<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boa Sorte!</title>
    <style>
        :root {
            --repsol-orange: #FF5D00;
            --repsol-red: #E6332A;
            /* Gradiente de metal mais realista */
            --metal-bg: radial-gradient(circle at 30% 30%, #d1d1d1, #a1a1a1 50%, #757575 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 380px;
            width: 100%;
            border-top: 8px solid #333; /* Cor neutra para não dar pistas */
        }

        h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .scratch-box {
            aspect-ratio: 1/1;
            position: relative;
            cursor: pointer;
        }

        /* Camada Metalizada */
        .cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--metal-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #444;
            font-weight: bold;
            z-index: 2;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #999;
        }

        /* Conteúdo Oculto (Atrás da raspadinha) */
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: var(--repsol-orange);
            z-index: 1;
            border: 1px solid #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        /* Animação de "Raspar" */
        .scratch-box.scratched .cover {
            opacity: 0;
            transform: scale(1.3) rotate(15deg);
            pointer-events: none;
        }

        #result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #fff4ed;
            border-radius: 15px;
            border: 2px dashed var(--repsol-orange);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .win-title {
            color: var(--repsol-red);
            font-weight: 800;
            font-size: 1.3em;
            margin: 0 0 10px 0;
        }

        .btn-claim {
            background-color: var(--repsol-orange);
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-claim:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🍀 Tenta a Sorte!</h1>
    <p>Consegues encontrar 3 iguais?<br><small>Escolhe 3 círculos para raspar</small></p>

    <div class="grid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="scratch-box" onclick="scratch(this)">
                        <div class="cover">${i}</div>
                        <div class="content">REPSOL</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div id="result-box">
        <p class="win-title">✨ TEMOS VENCEDOR! ✨</p>
        <p>Parabéns! Acabaste de ganhar a obrigatoriedade de fazer um contrato <strong>Repsol</strong> hoje!</p>
        <button class="btn-claim" onclick="location.reload()">RECLAMAR PRÉMIO</button>
    </div>
</div>

<script>
    let clicks = 0;
    const maxClicks = 3;

    function scratch(element) {
        if (!element.classList.contains('scratched') && clicks < maxClicks) {
            element.classList.add('scratched');
            clicks++;

            if (clicks === maxClicks) {
                setTimeout(() => {
                    document.getElementById('result-box').style.display = 'block';
                    // Scroll suave para a mensagem
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 600);
            }
        }
    }
</script>

</body>
</html>
