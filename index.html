<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspadinha Premiada Repsol</title>
    <style>
        :root {
            --repsol-orange: #FF5D00;
            --repsol-red: #E6332A;
            --metal-bg: linear-gradient(135deg, #bdc3c7 0%, #7f8c8d 50%, #d5d8dc 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
            border-top: 10px solid var(--repsol-orange);
        }

        .logo-header {
            font-weight: 900;
            font-size: 32px;
            color: var(--repsol-orange);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .scratch-box {
            aspect-ratio: 1/1;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
        }

        /* Camada de cima (Metalizada) */
        .cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--metal-bg);
            border-radius: 50%; /* Formato circular como na imagem */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #444;
            font-weight: bold;
            z-index: 2;
            transition: all 0.5s ease;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2), 2px 2px 5px rgba(255,255,255,0.5);
            border: 1px solid #aaa;
        }

        /* Camada de baixo (Oculta) */
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--repsol-orange);
            z-index: 1;
            border: 1px solid #ddd;
        }

        /* Efeito de raspagem ao clicar */
        .scratch-box.scratched .cover {
            opacity: 0;
            transform: scale(1.2) rotate(15deg);
            pointer-events: none;
        }

        #win-message {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #fff4ed;
            border-radius: 10px;
            border: 2px solid var(--repsol-orange);
            animation: fadeIn 0.4s ease-in-out;
        }

        .btn-action {
            background: var(--repsol-orange);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-header">REPSOL</div>
    <p>Escolha 3 círculos para raspar:</p>
    
    <div class="grid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="scratch-box" onclick="scratch(this)">
                        <div class="cover">${i}</div>
                        <div class="content">REPSOL</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div id="win-message">
        <h3 style="color: var(--repsol-red); margin: 0;">🎉 GANHASTE!</h3>
        <p>Acabaste de ganhar a obrigatoriedade de fazer um contrato <b>Repsol</b> hoje!</p>
        <button class="btn-action" onclick="location.reload()">RECLAMAR AGORA</button>
    </div>
</div>

<script>
    let revealedCount = 0;
    function scratch(element) {
        if (!element.classList.contains('scratched') && revealedCount < 3) {
            element.classList.add('scratched');
            revealedCount++;
            
            if (revealedCount === 3) {
                setTimeout(() => {
                    document.getElementById('win-message').style.display = 'block';
                }, 600);
            }
        }
    }
</script>

</body>
</html>
